<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controdollar | Login</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- CSS propio (misma carpeta) -->
    <link rel="stylesheet" href="login.css">
</head>
<body>

<div class="container-fluid vh-100 d-flex justify-content-center align-items-center bg-main">

    <div class="col-11 col-sm-8 col-md-5 col-lg-4">
        <div class="card login-card p-4 shadow-lg">

            <!-- Título -->
            <div class="text-center mb-4">
                <h2 class="brand">Controdollar</h2>
                <p class="subtitle">Controla tus finanzas</p>
            </div>

            <!-- Formulario -->
            <form id="formLogin">

                <div class="mb-3">
                    <label class="form-label">Usuario o Email</label>
                    <input type="text" id="usuario" class="form-control" placeholder="Ej: usuario@email.com">
                </div>

                <div class="mb-3">
                    <label class="form-label">Contraseña</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••">
                </div>

                <div class="d-flex justify-content-between mb-3">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox">
                        <label class="form-check-label small">Recordarme</label>
                    </div>
                    <a href="#" class="link small">¿Olvidaste tu contraseña?</a>
                </div>

                <button type="submit" class="btn btn-main w-100">
                    Iniciar sesión
                </button>

            </form>

            <!-- Link a registro -->
            <div class="text-center mt-3">
                <p class="small">
                    ¿No tienes cuenta?
                    <a href="../register/register.html" class="link">Regístrate</a>
                </p>
            </div>

        </div>
    </div>

</div>

<script src="login.js"></script>

</body>
</html>
