<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controdollar | Registro</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS propio -->
    <link rel="stylesheet" href="register.css">
</head>
<body>

<div class="container-fluid vh-100 d-flex justify-content-center align-items-center bg-main">

    <div class="col-11 col-sm-8 col-md-5 col-lg-4">
        <div class="card register-card p-4 shadow-lg">

            <!-- Título -->
            <div class="text-center mb-4">
                <h2 class="brand">Controdollar</h2>
                <p class="subtitle">Crea tu cuenta</p>
            </div>

            <!-- Formulario -->
            <form id="formRegistro">

                <div class="mb-3">
                    <label class="form-label">Nombre</label>
                    <input type="text" id="nombre" class="form-control" placeholder="Tu nombre">
                </div>

                <div class="mb-3">
                    <label class="form-label">Usuario o Email</label>
                    <input type="text" id="usuario" class="form-control" placeholder="usuario@email.com">
                </div>

                <div class="mb-3">
                    <label class="form-label">Contraseña</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••">
                </div>

                <div class="mb-3">
                    <label class="form-label">Confirmar contraseña</label>
                    <input type="password" id="confirmar" class="form-control" placeholder="••••••••">
                </div>

                <button type="submit" class="btn btn-main w-100">
                    Registrarse
                </button>

            </form>

            <!-- Volver al login -->
            <div class="text-center mt-3">
                <p class="small">
                    ¿Ya tienes cuenta?
                    <a href="../login/login.html" class="link">Inicia sesión</a>
                </p>
            </div>

        </div>
    </div>

</div>

<script src="register.js"></script>

</body>
</html>
